# Production stack: Caddy (TLS + static + reverse proxy) -> API -> Postgres/Redis.
#
# Only Caddy publishes ports. Postgres, Redis and the API are reachable only on
# the internal network -- the database is never exposed to the internet, which is
# the single most common way these deployments get owned.
#
# See DEPLOY.md. Secrets come from .env.prod (gitignored), never from this file.

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # deliberately no `ports:` -- internal network only

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # pure cache; nothing to persist
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT}
      # Caddy terminates TLS and forwards, so the real client IP arrives in
      # X-Forwarded-For. Safe to trust *because* the API is not directly exposed.
      TRUST_PROXY_HEADER: "true"
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      # same-origin behind Caddy -> no CORS needed
      CORS_ORIGINS: ""
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web:/srv/web:ro
      - caddy_data:/data      # TLS certificates; losing this re-issues them
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  # Copies the built frontend out of the API image into the shared volume Caddy
  # serves, then exits. Runs on every `up`, so a redeploy refreshes the bundle.
  web-assets:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["sh", "-c", "cp -r /srv/web/. /out/"]
    volumes:
      - web:/out
    restart: "no"

volumes:
  pgdata:
  web:
  caddy_data:
  caddy_config:
